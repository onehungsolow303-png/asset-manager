name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  unit:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev deps (no pcg extras for CI speed)
        run: pip install -e ".[dev]"

      # The test suite excludes tests/legacy/ via collect_ignore_glob in
      # conftest.py. The 4 cv2-deps in border_detect runtime modules will
      # show as skipped (cv2 isn't installed in CI by default).
      - name: Run pytest
        run: pytest tests/test_bridge.py tests/test_imports.py tests/test_generators_sprite.py tests/test_generators_texture.py tests/test_generators_manifest.py -v

  smoke:
    name: live HTTP smoke
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev deps
        run: pip install -e ".[dev]"

      - name: Boot uvicorn in background
        run: |
          nohup uvicorn asset_manager.bridge.server:app --port 7801 > /tmp/am.log 2>&1 &
          sleep 3

      - name: /health probe
        run: curl -fsS http://127.0.0.1:7801/health

      - name: Generate one creature token end-to-end
        run: |
          curl -fsS -X POST http://127.0.0.1:7801/generate \
            -H "Content-Type: application/json" \
            -d '{"schema_version":"1.0.0","kind":"creature_token","prompt":"smoke","constraints":{"color":[200,50,50,255],"size":32}}'

      - name: Show server log on failure
        if: failure()
        run: cat /tmp/am.log
